<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(220, 30, 30, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(10, 10, 30, 0.8) 0%, transparent 60%);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 48px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* ────────────────────────────────────────
       Warning icon
    ──────────────────────────────────────── */
    .icon-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-wrap::before,
    .icon-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(220, 30, 30, 0.25);
      animation: ripple 1.8s ease-out infinite;
    }
    .icon-wrap::after { animation-delay: 0.9s; }

    @keyframes ripple {
      0%   { transform: scale(0.8); opacity: 0.9; }
      100% { transform: scale(2.2); opacity: 0;   }
    }

    .warning-svg {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 0 18px rgba(255, 50, 50, 0.95));
      animation: blink 0.9s step-start infinite;
    }

    @keyframes blink {
      0%, 49%  { opacity: 1;    }
      50%, 100% { opacity: 0.05; }
    }

    /* ────────────────────────────────────────
       Red frame — discontinued
    ──────────────────────────────────────── */
    .frame-red {
      width: 100%;
      border-radius: 16px;
      border: 1.5px solid rgba(220, 30, 30, 0.55);
      background: linear-gradient(135deg, rgba(30, 5, 5, 0.92) 0%, rgba(18, 8, 8, 0.96) 100%);
      box-shadow:
        0 0 0 1px rgba(255, 50, 50, 0.08),
        0 4px 40px rgba(220, 30, 30, 0.22),
        inset 0 1px 0 rgba(255, 80, 80, 0.12);
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
    }

    .frame-red::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff2222 30%, #ff6666 50%, #ff2222 70%, transparent);
      animation: scanline 2.4s linear infinite;
    }

    @keyframes scanline {
      0%   { opacity: 0.3; }
      50%  { opacity: 1;   }
      100% { opacity: 0.3; }
    }

    .frame-red .label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ff4444;
      margin-bottom: 14px;
    }

    .frame-red h2 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .app-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .app-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255, 30, 30, 0.08);
      border: 1px solid rgba(255, 30, 30, 0.18);
    }

    .app-item-name {
      font-size: 14px;
      font-weight: 600;
      color: #ffaaaa;
      text-decoration: line-through;
      text-decoration-color: rgba(255, 80, 80, 0.6);
    }

    .app-item-badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #ff4444;
      background: rgba(255, 30, 30, 0.15);
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid rgba(255, 50, 50, 0.3);
    }

    /* ────────────────────────────────────────
       Green frame — active
    ──────────────────────────────────────── */
    .frame-green {
      width: 100%;
      border-radius: 16px;
      border: 1.5px solid rgba(0, 210, 120, 0.5);
      background: linear-gradient(135deg, rgba(4, 22, 14, 0.95) 0%, rgba(6, 18, 12, 0.98) 100%);
      box-shadow:
        0 0 0 1px rgba(0, 210, 120, 0.06),
        0 4px 48px rgba(0, 210, 120, 0.22),
        inset 0 1px 0 rgba(0, 255, 150, 0.12);
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
    }

    .frame-green::before {
      content: '';
      position: absolute;
      top: -60%; left: -40%;
      width: 180%; height: 180%;
      background: radial-gradient(ellipse at 50% 50%, rgba(0, 230, 130, 0.07), transparent 65%);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.5; transform: scale(1);    }
      50%       { opacity: 1;   transform: scale(1.08); }
    }

    .frame-green .label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #00e080;
      margin-bottom: 14px;
    }

    .active-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #00e080;
      box-shadow: 0 0 10px #00e080;
      animation: dot-blink 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes dot-blink {
      0%, 100% { opacity: 1;   box-shadow: 0 0 10px #00e080, 0 0 20px #00e080; }
      50%       { opacity: 0.4; box-shadow: 0 0 4px #00e080; }
    }

    .active-app {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(0, 220, 120, 0.12), rgba(0, 180, 100, 0.06));
      border: 1px solid rgba(0, 210, 120, 0.28);
      position: relative;
      z-index: 1;
    }

    .active-app-name {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .active-app-sub {
      font-size: 12px;
      color: #00d080;
      font-weight: 500;
      margin-top: 2px;
    }

    .active-app-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #00d080, #00a060);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0, 200, 120, 0.4);
    }

    /* ────────────────────────────────────────
       Image frame
    ──────────────────────────────────────── */
    .frame-image {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      box-shadow:
        0 8px 48px rgba(0, 0, 0, 0.6),
        0 2px 8px rgba(0, 0, 0, 0.4);
      position: relative;
      background: #111;
    }

    .frame-image img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .frame-image:hover img {
      transform: scale(1.04);
    }

    .frame-image .img-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to top, rgba(10,10,15,0.88), transparent);
      pointer-events: none;
    }

    .frame-image .img-label {
      position: absolute;
      bottom: 14px;
      left: 18px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.04em;
    }

    /* ────────────────────────────────────────
       Round buttons row
    ──────────────────────────────────────── */
    .btn-row {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    /* Each button is a wrapper that holds the canvas + the actual button circle */
    .btn-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* Particle canvas sits behind the button */
    .btn-canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border-radius: 50%;
    }

    /* The circular button itself */
    .btn-circle {
      position: relative;
      z-index: 2;
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: none;
      outline: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.18s ease;
    }

    .btn-circle:active {
      transform: scale(0.93) !important;
    }

    /* Download — green */
    .btn-circle-download {
      background: conic-gradient(from 180deg, #00ff90, #00c875, #009950, #00c875, #00ff90);
      box-shadow:
        0 0 0 3px rgba(0, 200, 120, 0.25),
        0 6px 32px rgba(0, 200, 100, 0.55),
        inset 0 2px 0 rgba(255,255,255,0.22);
    }

    .btn-circle-download:hover {
      transform: scale(1.08);
      box-shadow:
        0 0 0 5px rgba(0, 200, 120, 0.3),
        0 10px 48px rgba(0, 200, 100, 0.7),
        inset 0 2px 0 rgba(255,255,255,0.22);
    }

    /* TikTok — dark gradient */
    .btn-circle-tiktok {
      background: conic-gradient(from 180deg, #ff0050, #00f2ea, #ff0050, #00f2ea, #ff0050);
      box-shadow:
        0 0 0 3px rgba(255, 0, 80, 0.22),
        0 6px 32px rgba(255, 0, 80, 0.45),
        inset 0 2px 0 rgba(255,255,255,0.18);
    }

    .btn-circle-tiktok:hover {
      transform: scale(1.08);
      box-shadow:
        0 0 0 5px rgba(255, 0, 80, 0.28),
        0 10px 48px rgba(255, 0, 80, 0.6),
        inset 0 2px 0 rgba(255,255,255,0.18);
    }

    /* Inner white disc for contrast */
    .btn-inner {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: rgba(10, 10, 16, 0.82);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.3;
    }

    .btn-label-download { color: #00e080; }
    .btn-label-tiktok   { color: #ff4080; }

    /* Ripple click feedback */
    .ripple-ring {
      position: absolute;
      z-index: 1;
      top: 50%; left: 50%;
      width: 86px; height: 86px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(1);
      opacity: 0;
      pointer-events: none;
    }

    .ripple-ring.go {
      animation: ripple-out 0.6s ease-out forwards;
    }

    @keyframes ripple-out {
      0%   { transform: translate(-50%, -50%) scale(1);   opacity: 0.7; }
      100% { transform: translate(-50%, -50%) scale(2.4); opacity: 0;   }
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20, 20, 30, 0.96);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG — chỉnh link tại đây
══════════════════════════════════════════════════════════ */
const DOWNLOAD_URL = '#';           // thay bằng link tải thật của bạn
const TIKTOK_URL   = 'https://www.tiktok.com'; // thay bằng link TikTok của bạn

/* ══════════════════════════════════════════════════════════
   PARTICLE ENGINE
══════════════════════════════════════════════════════════ */
class ParticleSystem {
  constructor(canvasEl, config) {
    this.canvas  = canvasEl;
    this.ctx     = canvasEl.getContext('2d');
    this.W       = canvasEl.width;
    this.H       = canvasEl.height;
    this.cx      = this.W / 2;
    this.cy      = this.H / 2;
    this.config  = config;          // { color, orbitR, count, active }
    this.particles = [];
    this.angle   = 0;               // global orbit rotation
    this.raf     = null;
    this._build();
    this._tick();
  }

  _build() {
    const { count, orbitR, color } = this.config;
    this.particles = [];
    for (let i = 0; i < count; i++) {
      const spread = orbitR + (Math.random() - 0.5) * 28;
      this.particles.push({
        orbitR  : spread,
        angle   : (i / count) * Math.PI * 2 + Math.random() * 0.4,
        speed   : 0.012 + Math.random() * 0.018,
        radius  : 1.5 + Math.random() * 3.5,
        alpha   : 0.3 + Math.random() * 0.7,
        alphaDt : 0.008 + Math.random() * 0.016,
        alphaDir: Math.random() > 0.5 ? 1 : -1,
        color   : color[Math.floor(Math.random() * color.length)],
        trail   : [],
        trailLen: Math.floor(4 + Math.random() * 8),
      });
    }
  }

  setActive(val) {
    this.config.active = val;
  }

  _tick() {
    const { ctx, W, H, cx, cy, config, particles } = this;
    ctx.clearRect(0, 0, W, H);

    const opacity = config.active ? 1 : 0.32;

    particles.forEach(p => {
      /* orbit angle */
      p.angle += p.speed * (config.active ? 1.8 : 0.6);

      const x = cx + Math.cos(p.angle) * p.orbitR;
      const y = cy + Math.sin(p.angle) * p.orbitR;

      /* trail */
      p.trail.unshift({ x, y });
      if (p.trail.length > p.trailLen) p.trail.pop();

      /* alpha pulse */
      p.alpha += p.alphaDt * p.alphaDir;
      if (p.alpha >= 1)   { p.alpha = 1;   p.alphaDir = -1; }
      if (p.alpha <= 0.1) { p.alpha = 0.1; p.alphaDir =  1; }

      /* draw trail */
      p.trail.forEach((pt, idx) => {
        const t = 1 - idx / p.trail.length;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, p.radius * t, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha * t * opacity;
        ctx.fill();
      });

      /* draw core particle */
      ctx.beginPath();
      ctx.arc(x, y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha * opacity;
      ctx.fill();

      /* glow */
      if (config.active) {
        const grd = ctx.createRadialGradient(x, y, 0, x, y, p.radius * 4);
        grd.addColorStop(0, p.color.replace('1)', '0.35)').replace('#', 'rgba_'));
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(x, y, p.radius * 4, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.globalAlpha = 0.4 * opacity;
        ctx.fill();
      }

      ctx.globalAlpha = 1;
    });

    this.raf = requestAnimationFrame(() => this._tick());
  }

  burst() {
    /* on click: spawn short-lived burst particles */
    const { ctx, cx, cy, config } = this;
    const bursts = [];
    for (let i = 0; i < 24; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 3;
      const color = config.color[Math.floor(Math.random() * config.color.length)];
      bursts.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 2 + Math.random() * 3,
        alpha: 1,
        color,
      });
    }

    let frame = 0;
    const draw = () => {
      frame++;
      bursts.forEach(b => {
        b.x += b.vx;
        b.y += b.vy;
        b.vy += 0.08;
        b.alpha -= 0.035;
        if (b.alpha <= 0) return;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.globalAlpha = b.alpha;
        ctx.fill();
        ctx.globalAlpha = 1;
      });
      if (frame < 40) requestAnimationFrame(draw);
    };
    draw();
  }

  destroy() {
    cancelAnimationFrame(this.raf);
  }
}

/* ══════════════════════════════════════════════════════════
   BUILD SYSTEMS
══════════════════════════════════════════════════════════ */
const psDownload = new ParticleSystem(
  document.getElementById('canvasDownload'),
  {
    color  : ['rgba(0,255,140,1)', 'rgba(0,210,100,1)', 'rgba(100,255,180,1)', 'rgba(0,180,80,1)'],
    orbitR : 56,
    count  : 28,
    active : false,
  }
);

const psTiktok = new ParticleSystem(
  document.getElementById('canvasTiktok'),
  {
    color  : ['rgba(255,0,80,1)', 'rgba(0,242,234,1)', 'rgba(255,80,140,1)', 'rgba(80,220,220,1)'],
    orbitR : 56,
    count  : 28,
    active : false,
  }
);

/* ══════════════════════════════════════════════════════════
   HOVER — activate particles on hover
══════════════════════════════════════════════════════════ */
const wrapDownload = document.getElementById('wrapDownload');
const wrapTiktok   = document.getElementById('wrapTiktok');

wrapDownload.addEventListener('mouseenter', () => psDownload.setActive(true));
wrapDownload.addEventListener('mouseleave', () => psDownload.setActive(false));
wrapTiktok.addEventListener('mouseenter',   () => psTiktok.setActive(true));
wrapTiktok.addEventListener('mouseleave',   () => psTiktok.setActive(false));

/* touch */
wrapDownload.addEventListener('touchstart', () => psDownload.setActive(true), { passive: true });
wrapDownload.addEventListener('touchend',   () => psDownload.setActive(false), { passive: true });
wrapTiktok.addEventListener('touchstart',   () => psTiktok.setActive(true), { passive: true });
wrapTiktok.addEventListener('touchend',     () => psTiktok.setActive(false), { passive: true });

/* ══════════════════════════════════════════════════════════
   RIPPLE helper
══════════════════════════════════════════════════════════ */
function triggerRipple(id) {
  const el = document.getElementById(id);
  el.classList.remove('go');
  void el.offsetWidth; /* reflow */
  el.classList.add('go');
  el.addEventListener('animationend', () => el.classList.remove('go'), { once: true });
}

/* ══════════════════════════════════════════════════════════
   TOAST helper
══════════════════════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ══════════════════════════════════════════════════════════
   CLICK — Download button
══════════════════════════════════════════════════════════ */
document.getElementById('btnDownload').addEventListener('click', (e) => {
  e.preventDefault();
  psDownload.setActive(true);
  psDownload.burst();
  triggerRipple('rippleDownload');
  showToast('⬇️  Đang chuyển hướng tải Super Hitlock...');

  setTimeout(() => {
    if (DOWNLOAD_URL && DOWNLOAD_URL !== '#') {
      window.open(DOWNLOAD_URL, 'https://www.mediafire.com/file/sfux1w7t293r7gl/HITLOCK+SUPER.zip/file');
    } else {
      showToast('⚠️  Chưa có link tải — vui lòng liên hệ Admin');
    }
    psDownload.setActive(false);
  }, 700);
});
